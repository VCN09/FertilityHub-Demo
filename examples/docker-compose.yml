version: '3.8'services:
web:
build: .
ports:
- "5000:5000"
environment:
FLASK_ENV: development
DATABASE_URL: sqlite:///fertility_hub.db
volumes:
- .:/app
command: python wsgi.pypostgres:
image: postgres:15
environment:
POSTGRES_DB: fertility_hub
POSTGRES_USER: admin
POSTGRES_PASSWORD: secret
ports:
- "5432:5432"
volumes:
- postgres_data:/var/lib/postgresql/datavolumes:
postgres_data:
